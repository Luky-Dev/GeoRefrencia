<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>Añadir Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        table input {
            padding-top: 35px;
            width: 100%;
            border: none;
            background: transparent;
            z-index: 200;
        }

        table input:focus {
            outline: 1px solid #007bff;
            background: #eef;
        }

        .texto-bajito {
            margin-top: 60px;
            margin-bottom: 20px;
            font-size: 24px;
        }

        #formulario-registros {
            margin-top: 30px;
        }

        .btn-volver-mapa {
            margin-bottom: 10px;
        }
    </style>
</head>

<body class="p-4">
    <!-- Botón volver al mapa -->

    <a href="/ver_base">
        <button class="btn btn-warning btn-sm " id="btn-registros">Ver Registros</button>
    </a>

    <div id="button-container-editar">
        <a href="/">
            <button class="btn btn-warning btn-lg btn-volver-mapa">Volver al mapa</button>
        </a>
    </div>

    <!-- Botón modo oscuro -->
    <div class="darkmode-container">
        <button id="toggleDarkMode" class="btn btn-dark btn-sm">
            🌙 Modo Oscuro
        </button>
    </div>

    <!-- Título -->
    <h2 class="texto-bajito">Añadir registros</h2>

    <!-- Formulario -->
    <div id="formulario-registros">
        <form action="/guardar_edicion" method="POST" class="mt-3 mb-5">
            <div class="table-responsive">
                <table class="table table-bordered table-sm table-striped" id="tabla-registros">
                    <thead class="table-dark">
                        <tr>
                            {% for col in columnas %}
                            <th>{{ col }}</th>
                            {% endfor %}
                        </tr>
                    </thead>
                    <tbody id="tbody-registros">
                        <tr>
                            {% for col in columnas %}
                            <td>
                                {% if col in opciones_fijas %}
                                <select name="{{ col }}_0" class="form-select">
                                    <option value="">-- Seleccionar --</option>
                                    {% for opcion in opciones_fijas[col] %}
                                    <option value="{{ opcion }}">{{ opcion }}</option>
                                    {% endfor %}
                                </select>
                                {% else %}
                                <input type="text" name="{{ col }}_0" class="form-control">
                                {% endif %}
                            </td>
                            {% endfor %}
                        </tr>
                    </tbody>

                </table>
            </div>

            <input type="hidden" name="total_filas" id="total_filas" value="1">

            <button type="button" class="btn btn-secondary mt-3" onclick="añadirFila()">➕ Añadir otra fila</button>
            <button type="submit" class="btn btn-success mt-3 ms-2">💾 Guardar Registros</button>
        </form>
    </div>

    <!-- Scripts -->
    <script>
        let contadorFilas = 1;
        const columnas = {{ columnas | tojson }};
        const opcionesFijas = {{ opciones_fijas | tojson }};

        function añadirFila() {
            const tbody = document.getElementById("tbody-registros");
            const nuevaFila = document.createElement("tr");

            columnas.forEach(col => {
                const celda = document.createElement("td");
                let elemento;

                if (opcionesFijas[col]) {
                    elemento = document.createElement("select");
                    elemento.classList.add("form-select");
                    elemento.name = `${col}_${contadorFilas}`;
                    const emptyOption = document.createElement("option");
                    emptyOption.value = "";
                    emptyOption.textContent = "-- Seleccionar --";
                    elemento.appendChild(emptyOption);

                    opcionesFijas[col].forEach(op => {
                        const option = document.createElement("option");
                        option.value = op;
                        option.textContent = op;
                        elemento.appendChild(option);
                    });
                } else {
                    elemento = document.createElement("input");
                    elemento.type = "text";
                    elemento.classList.add("form-control");
                    elemento.name = `${col}_${contadorFilas}`;
                }

                celda.appendChild(elemento);
                nuevaFila.appendChild(celda);
            });

            tbody.appendChild(nuevaFila);
            contadorFilas++;
            document.getElementById("total_filas").value = contadorFilas;
        }
    </script>

    <script>
        const botonDarkMode = document.getElementById("toggleDarkMode");
        const isDark = localStorage.getItem("modoOscuro") === "true";

        if (isDark) {
            document.body.classList.add("dark-mode");
            botonDarkMode.textContent = "☀️ Modo Claro";
        }

        botonDarkMode.addEventListener("click", () => {
            document.body.classList.toggle("dark-mode");
            const esModoOscuro = document.body.classList.contains("dark-mode");
            botonDarkMode.textContent = esModoOscuro ? "☀️ Modo Claro" : "🌙 Modo Oscuro";
            localStorage.setItem("modoOscuro", esModoOscuro);
        });
    </script>
</body>

</html>
