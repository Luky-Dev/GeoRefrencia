<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa de prueba</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body>

  <div id="editarContainer">
    <a href="/editar">
      <button id="toggleEditar" class="btn btn-info">📝Editar Base de Datos</button>
    </a>
  </div>
  </div>
  <div class="mapa-y-filtros d-flex flex-column-reverse flex-md-column">
    <!-- FILTROS -->
    <div class="container my-3 filtros-container" id="mainDiv">
      <div class="row g-3 align-items-center">
        <div class="col-md-3">
          <label for="filtroGenero" class="form-label">Género</label>
          <select id="filtroGenero" class="form-select">
            <option value="">Todos</option>
            <option value="Masculino">Masculino</option>
            <option value="Femenino">Femenino</option>
          </select>
        </div>

        <div class="col-md-3">
          <label for="filtroEstrato" class="form-label">Estrato</label>
          <select id="filtroEstrato" class="form-select">
            <option value="">Todos</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4+</option>
          </select>
        </div>

        <div class="col-md-3">
          <label for="filtroNivel" class="form-label">Nivel educativo</label>
          <select id="filtroNivel" class="form-select">
            <option value="">Todos</option>
          </select>
        </div>

        <div class="col-md-3">
          <label for="filtroVotoCongreso" class="form-label">¿Vota Congreso?</label>
          <select id="filtroVotoCongreso" class="form-select">
            <option value="">Todos</option>
            <option value="SI">Sí</option>
            <option value="NO">No</option>
          </select>
        </div>

        <div class="col-md-3">
          <label for="filtroSupervisor" class="form-label">Líder / Supervisor</label>
          <select id="filtroSupervisor" class="form-select">
            <option value="">Todos</option>
          </select>
        </div>
      </div>

      <div class="text-center mt-3" style="max-width: 300px; margin: 0 auto;">
        <div class="search-container text-center mb-3" style="max-width: 300px; margin: 0 auto;">
          <input id="inputCedula" type="text" placeholder="Buscar por cédula"
            class="form-control d-inline-block mb-2" />
          <button onclick="buscarPorCedula()" class="btn btn-info" id="botonBuscar">🔍 Buscar</button>
        </div>
      </div>
    </div>

    <!-- MAPA -->
    <div id="map"></div>
  </div>

  <!-- MODO OSCURO -->
  <div class="darkmode-container">
    <button id="toggleDarkMode" class="btn btn-dark btn-sm">🌙 Modo Oscuro</button>
  </div>

  <script>
    const supervisorLabels = {{ supervisor_labels | tojson }};
    const supervisorValues = {{ supervisor_values | tojson }};
    const marcadores = {{ marcadores | tojson }};
  </script>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
